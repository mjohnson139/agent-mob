# Agent Mob — Team Roster
# GitHub IDs are the canonical identifiers.
# Add linear: {linear-user-id} to enable Linear issue assignment.
# A member must appear here before being added to any project.
#
# Usage: copy this file to the root of your mob repo as team.yml,
# then replace the placeholder with the lead's GitHub ID.
# Add team members with /mob-add-member {github-id}.

team:
  - id: ""  # github-id of project lead
